# Cloudflare Worker config for the listing-media proxy (image-proxy-worker.js).
# Deploy:  npx wrangler deploy
# The deployed URL will be https://moto2-image-proxy.<your-subdomain>.workers.dev
# Put that origin (no trailing "/?url=") into moto2-site's
# src/config/data-source.ts `imageProxyUrl` to route photos/videos through it.

name = "moto2-image-proxy"
main = "image-proxy-worker.js"
compatibility_date = "2026-07-13"

# Serve on the free *.workers.dev subdomain (no custom domain / bindings needed).
workers_dev = true
